<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>「ARCH」 SUIKA GAME</title>
    <style>
        /* 모던한 블랙 앤 화이트 테마 설정 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #0d0d0d; /* 깊은 블랙 배경 */
            color: #ffffff; /* 텍스트는 화이트 */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; /* 화면 스크롤 방지 */
        }

        /* 시크한 타이틀 디자인 */
        h1 { 
            margin-top: 30px; 
            margin-bottom: 15px;
            font-size: 28px;
            letter-spacing: 5px; /* 글자 간격을 넓혀서 세련된 느낌 추가 */
            font-weight: 300;
        }
        h1 strong {
            font-weight: 800;
        }

        /* 게임 캔버스 (흰색 테두리와 미세한 빛 번짐 효과) */
        canvas {
            border: 2px solid #ffffff;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1); /* 은은한 화이트 글로우 */
        }
    </style>
    <!-- Matter.js 물리 엔진 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <h1>「 <strong>ARCH</strong> 」 SUIKA GAME</h1>

    <script>
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Events = Matter.Events,
              Body = Matter.Body; // 속도 조절을 위해 추가

        const engine = Engine.create();
        const world = engine.world;

        const CANVAS_WIDTH = 600;
        const CANVAS_HEIGHT = 800;

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: CANVAS_WIDTH,
                height: CANVAS_HEIGHT,
                wireframes: false, 
                background: '#1a1a1a' // 캔버스 안쪽은 아주 어두운 다크 그레이로 설정 (과일 컬러 강조)
            }
        });

        // 🍎 1. 과일 데이터 (이전과 동일)
        const FRUITS = [
            { radius: 15, name: './A1.png' },   
            { radius: 25, name: './A2.png' },   
            { radius: 35, name: './A3.png' },   
            { radius: 45, name: './A4.png' },   
            { radius: 55, name: './A5.png' },   
            { radius: 65, name: './A6.png' },   
            { radius: 75, name: './A7.png' },   
            { radius: 85, name: './A8.png' },   
            { radius: 100, name: './A9.png' },  
            { radius: 120, name: './A10.png' }, 
            { radius: 150, name: './A11.png' }  
        ];

        // 🧱 2. 벽과 바닥 (블랙 앤 화이트에 맞춰 흰색으로 변경)
        const wallOptions = { 
            isStatic: true, 
            render: { fillStyle: '#ffffff' } // 벽 색상을 화이트로 변경
        };
        const ground = Bodies.rectangle(CANVAS_WIDTH/2, CANVAS_HEIGHT + 10, CANVAS_WIDTH, 40, wallOptions);
        const leftWall = Bodies.rectangle(-10, CANVAS_HEIGHT/2, 40, CANVAS_HEIGHT * 2, wallOptions);
        const rightWall = Bodies.rectangle(CANVAS_WIDTH + 10, CANVAS_HEIGHT/2, 40, CANVAS_HEIGHT * 2, wallOptions);
        
        Composite.add(world, [ground, leftWall, rightWall]);

        // 🍉 3. 과일 생성 (물리 엔진 최적화)
        function createFruit(x, y, index) {
            if (index >= FRUITS.length) return; 

            const data = FRUITS[index];
            const baseImageSize = 200; // 원본 이미지 사이즈에 맞춰 조절
            const scale = (data.radius * 2) / baseImageSize;

            const fruit = Bodies.circle(x, y, data.radius, {
                restitution: 0.1,     // 튕김을 줄여서 안정감 있게
                friction: 0.5,        // 미끄러짐 방지
                density: 0.001 * (index + 1), // 단계가 클수록 무겁게 설정 (안정적인 쌓임)
                label: `fruit_${index}`,
                render: {
                    sprite: {
                        texture: data.name,
                        xScale: scale, 
                        yScale: scale  
                    }
                }
            });
            return fruit;
        }

        // 🖱️ 4. 클릭 생성
        window.addEventListener('mousedown', (event) => {
            const bounds = render.canvas.getBoundingClientRect();
            const clickX = event.clientX - bounds.left;
            if (clickX < 0 || clickX > CANVAS_WIDTH) return;

            const randomIndex = Math.floor(Math.random() * 5); 
            const newFruit = createFruit(clickX, 50, randomIndex);
            
            if (newFruit) Composite.add(world, newFruit);
        });

        // 💥 5. 부드러운 충돌(진화) 이벤트 로직
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((collision) => {
                const bodyA = collision.bodyA;
                const bodyB = collision.bodyB;

                if (bodyA.label.startsWith('fruit_') && bodyB.label.startsWith('fruit_')) {
                    const indexA = parseInt(bodyA.label.split('_')[1]);
                    const indexB = parseInt(bodyB.label.split('_')[1]);

                    if (indexA === indexB) {
                        Composite.remove(world, [bodyA, bodyB]);

                        const newX = (bodyA.position.x + bodyB.position.x) / 2;
                        const newY = (bodyA.position.y + bodyB.position.y) / 2;

                        // ★ 부드러운 모션의 핵심: 합쳐지기 전 두 과일의 움직이던 속도의 평균을 구합니다.
                        const velocityX = (bodyA.velocity.x + bodyB.velocity.x) / 2;
                        const velocityY = (bodyA.velocity.y + bodyB.velocity.y) / 2;

                        const nextFruit = createFruit(newX, newY, indexA + 1);
                        
                        if (nextFruit) {
                            // 새로 생성된 과일에 속도를 그대로 전달하여 덜컹거림 방지
                            Body.setVelocity(nextFruit, { x: velocityX, y: velocityY });
                            Composite.add(world, nextFruit);
                        }
                    }
                }
            });
        });

        // 6. 실행
        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

    </script>
</body>
</html>
